version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: screek-db
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - screek-network

  redis:
    image: redis:7-alpine
    container_name: screek-redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - screek-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: screek-backend
    restart: on-failure
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8003:8080"
    environment:
      - DATABASE_URL=host=db user=postgres password=password dbname=screek port=5432 sslmode=disable TimeZone=America/Sao_Paulo
      - REDIS_URL=redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - TMDB_TOKEN=${TMDB_TOKEN}
      - STRIPE_KEY=${STRIPE_KEY}
      - RESEND_KEY=${RESEND_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
    networks:
      - screek-network

networks:
  screek-network:
    driver: bridge

volumes:
  postgres_data:
