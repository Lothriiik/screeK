host: localhost:8003
info:
  contact:
    email: suporte@screek.com
    name: Suporte screeK
    url: http://www.screek.com/support
  description: API para a plataforma de cinema screeK.
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: screeK API
  version: "1.0"
paths:
  /admin/analytics/genres:
    get:
      description: Analisa a distribuição de vendas por gênero de filme
      parameters:
      - description: Data inicial
        in: query
        name: start
        type: string
      - description: Data final
        in: query
        name: end
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/analytics.GenreStatsResponseDTO'
            type: array
      security:
      - BearerAuth: []
      summary: Preferência por gênero
      tags:
      - Analytics
  /admin/analytics/movies:
    get:
      description: Retorna ranking de filmes por bilheteria e ingressos vendidos
      parameters:
      - description: Data inicial
        in: query
        name: start
        type: string
      - description: Data final
        in: query
        name: end
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/analytics.MovieStatsDTO'
            type: array
      security:
      - BearerAuth: []
      summary: Desempenho por filme
      tags:
      - Analytics
  /admin/analytics/revenue:
    get:
      description: Retorna métricas financeiras (total, média, tendências)
      parameters:
      - description: Data inicial (YYYY-MM-DD)
        in: query
        name: start
        type: string
      - description: Data final (YYYY-MM-DD)
        in: query
        name: end
        type: string
      - description: Periodicidade (daily, monthly)
        in: query
        name: period
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/analytics.AnalyticsSummaryResponseDTO'
      security:
      - BearerAuth: []
      summary: Estatísticas de receita
      tags:
      - Analytics
  /admin/management/cinemas:
    get:
      description: Retorna todos os cinemas cadastrados (Apenas Admin/Manager)
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/cinema.CinemaAdminResponseDTO'
            type: array
      security:
      - BearerAuth: []
      summary: Listar cinemas (Admin)
      tags:
      - Management
    post:
      consumes:
      - application/json
      description: Cria um novo cinema no sistema (Apenas Admin)
      parameters:
      - description: Dados do cinema
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/cinema.CreateCinemaRequest'
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/httputil.MessageResponse'
      security:
      - BearerAuth: []
      summary: Cadastrar cinema
      tags:
      - Management
  /admin/management/cinemas/{id}:
    delete:
      description: Remove um cinema do sistema (Apenas se não houver salas vinculadas)
      parameters:
      - description: ID do Cinema
        in: path
        name: id
        required: true
        type: integer
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/httputil.MessageResponse'
      security:
      - BearerAuth: []
      summary: Excluir cinema (Admin)
      tags:
      - Management
    get:
      description: Retorna os dados completos de um cinema, incluindo salas
      parameters:
      - description: ID do Cinema
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/cinema.CinemaResponseDTO'
      security:
      - BearerAuth: []
      summary: Detalhes do cinema (Admin)
      tags:
      - Management
    put:
      consumes:
      - application/json
      description: Altera os dados de um cinema existente
      parameters:
      - description: ID do Cinema
        in: path
        name: id
        required: true
        type: integer
      - description: Novos dados
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/cinema.CreateCinemaRequest'
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/httputil.MessageResponse'
      security:
      - BearerAuth: []
      summary: Atualizar cinema (Admin)
      tags:
      - Management
  /admin/management/cinemas/{id}/rooms:
    post:
      consumes:
      - application/json
      description: Adiciona uma sala a um cinema e gera o mapa de assentos automaticamente
      parameters:
      - description: ID do Cinema
        in: path
        name: id
        required: true
        type: integer
      - description: Configuração da sala
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/cinema.CreateRoomRequest'
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/httputil.MessageResponse'
      security:
      - BearerAuth: []
      summary: Criar sala e assentos
      tags:
      - Management
  /admin/management/rooms/{id}:
    delete:
      description: Remove uma sala, verificado se não há sessões futuras
      parameters:
      - description: ID da Sala
        in: path
        name: id
        required: true
        type: integer
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/httputil.MessageResponse'
      security:
      - BearerAuth: []
      summary: Excluir sala (Admin)
      tags:
      - Management
    put:
      consumes:
      - application/json
      description: Altera os dados da sala, mas não altera os assentos
      parameters:
      - description: ID da Sala
        in: path
        name: id
        required: true
        type: integer
      - description: Novos dados (CinemaID opcional aqui)
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/cinema.CreateRoomRequest'
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/httputil.MessageResponse'
      security:
      - BearerAuth: []
      summary: Atualizar sala (Admin)
      tags:
      - Management
  /admin/management/sessions:
    get:
      description: Consulta sessões de forma expandida para gestão
