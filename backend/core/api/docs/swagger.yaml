            $ref: '#/definitions/social.PostDetailResponseDTO'
      security:
      - BearerAuth: []
      summary: Detalhes da postagem
      tags:
      - Social
    put:
      consumes:
      - application/json
      description: Atualiza o conteúdo de um post existente (apenas o autor)
      parameters:
      - description: ID do Post
        in: path
        name: id
        required: true
        type: integer
      - description: Novo conteúdo
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/social.UpdatePostRequest'
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/httputil.MessageResponse'
      security:
      - BearerAuth: []
      summary: Editar postagem
      tags:
      - Social
  /social/posts/{id}/like:
    post:
      description: Alterna o estado de curtida de um post
      parameters:
      - description: ID do Post
        in: path
        name: id
        required: true
        type: integer
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/social.ToggleLikeResponse'
      security:
      - BearerAuth: []
      summary: Curtir/Descurtir post
      tags:
      - Social
  /social/posts/{id}/reply:
    post:
      consumes:
      - application/json
      description: Cria um comentário/resposta em um post existente
      parameters:
      - description: ID do Post Pai
        in: path
        name: id
        required: true
        type: integer
      - description: Conteúdo da resposta
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/social.ReplyRequest'
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/httputil.MessageResponse'
      security:
      - BearerAuth: []
      summary: Responder postagem
      tags:
      - Social
  /social/users/{id}/followers:
    get:
      description: Retorna a lista de usuários que seguem o alvo
      parameters:
      - description: UUID do usuário
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/social.UserFollowResponseDTO'
            type: array
      security:
      - BearerAuth: []
      summary: Listar seguidores
      tags:
      - Social
  /social/users/{id}/following:
    get:
      description: Retorna a lista de usuários que o alvo segue
      parameters:
      - description: UUID do usuário
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/social.UserFollowResponseDTO'
            type: array
      security:
      - BearerAuth: []
      summary: Listar seguindo
      tags:
      - Social
  /social/users/{username}/follow:
    post:
      description: Alterna o estado de acompanhamento de um usuário pelo username
      parameters:
      - description: Username do alvo
        in: path
        name: username
        required: true
        type: string
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/social.ToggleFollowResponse'
      security:
      - BearerAuth: []
      summary: Seguir/Deixar de seguir
      tags:
      - Social
  /users/{id}:
    get:
      consumes:
      - application/json
      description: Retorna o perfil público de um usuário, incluindo seus filmes favoritos.
      parameters:
      - description: ID do Usuário (UUID)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/users.UserDetailsDTO'
        "404":
          description: Usuário não encontrado
          schema:
            type: string
      summary: Busca detalhes de um usuário pelo ID
      tags:
      - Users
  /users/{id}/stats:
    get:
      consumes:
      - application/json
      description: Retorna contadores de filmes, minutos assistidos e gênero favorito.
      parameters:
      - description: ID do Usuário (UUID)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/users.UserStats'
        "404":
          description: Estatísticas não encontradas
          schema:
            type: string
      summary: Retorna estatísticas do usuário
      tags:
      - Users
  /users/me:
    delete:
      consumes:
      - application/json
      description: Deleta permanentemente o usuário. Exige confirmação de senha.
      parameters:
      - description: JSON com a senha
        in: body
        name: body
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/httputil.MessageResponse'
        "401":
          description: Senha incorreta ou não autorizado
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Remove a conta do usuário logado
      tags:
      - Users
    get:
      consumes:
      - application/json
      description: Retorna os detalhes do usuário baseados no token JWT fornecido.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/users.UserMeDetailsDTO'
        "401":
          description: Não autorizado
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Retorna o perfil do usuário logado
      tags:
      - Users
    put:
      consumes:
      - application/json
      description: Permite alterar Nome, Bio, AvatarURL, Pronomes e Cidade do usuário
        autenticado.
      parameters:
      - description: Dados para atualização
        in: body
        name: user
        required: true
        schema:
          $ref: '#/definitions/users.UpdateUserDTO'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/httputil.MessageResponse'
        "401":
          description: Não autorizado
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Atualiza o perfil do usuário logado
      tags:
      - Users
  /users/me/favorites/{tmdb_id}:
    delete:
      description: Desvincula um filme do TMDB do perfil do usuário logado.
      parameters:
      - description: ID do filme no TMDB
        in: path
        name: tmdb_id
        required: true
        type: integer
      responses:
        "204":
          description: No Content
        "401":
          description: Não autorizado
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Remove um filme dos favoritos
      tags:
      - Users
    post:
      description: Vincula um filme do TMDB ao perfil do usuário logado.
      parameters:
      - description: ID do filme no TMDB
        in: path
        name: tmdb_id
        required: true
        type: integer
      responses:
        "204":
          description: No Content
        "401":
          description: Não autorizado
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Adiciona um filme aos favoritos
      tags:
      - Users
  /users/register:
    post:
      consumes:
      - application/json
      description: Cria um novo usuário no sistema com name, email, username e password.
      parameters:
      - description: Dados do Usuário
        in: body
        name: user
        required: true
        schema:
          $ref: '#/definitions/users.CreateUserDTO'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/users.UserDTO'
        "400":
          description: Erro na validação ou usuário já existe
          schema:
            type: string
      summary: Registra um novo usuário
      tags:
      - Users
  /users/search:
    get:
      consumes:
      - application/json
      description: Retorna uma lista de usuários que coincidem com o termo de busca
        'q'.
      parameters:
      - description: Termo de busca
        in: query
        name: q
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/users.UserDTO'
            type: array
        "400":
          description: Parâmetro 'q' obrigatório
          schema:
            type: string
      summary: Busca usuários por nome ou username
      tags:
      - Users
  /watchlist:
    get:
      description: Retorna todos os filmes salvos na lista de desejos do usuário autenticado
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/catalog.WatchlistItem'
            type: array
      security:
      - BearerAuth: []
      summary: Ver minha Watchlist
      tags:
      - Catalog
    post:
      consumes:
      - application/json
      description: Salva um filme na lista de desejos do usuário
      parameters:
      - description: ID do Filme
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/catalog.AddWatchlistRequest'
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/httputil.MessageResponse'
      security:
      - BearerAuth: []
      summary: Adicionar à Watchlist
      tags:
      - Catalog
  /watchlist/{movieID}:
    delete:
      description: Remove um filme da lista de desejos
      parameters:
      - description: ID do Filme
        in: path
        name: movieID
        required: true
        type: integer
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/httputil.MessageResponse'
      security:
      - BearerAuth: []
      summary: Remover da Watchlist
      tags:
      - Catalog
  /ws:
    get:
      description: Realiza o upgrade HTTP para WebSocket para receber alertas em tempo
        real.
      responses: {}
      security:
      - BearerAuth: []
      summary: Conexão WebSocket para Notificações
      tags:
      - Notifications
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
