          $ref: '#/definitions/analytics.DailyCinemaStatsResponseDTO'
        type: array
    type: object
  analytics.DailyCinemaStatsResponseDTO:
    properties:
      cinema_name:
        type: string
      date:
        type: string
      occupancy_rate:
        type: number
      tickets_sold:
        type: integer
      total_revenue:
        type: number
    type: object
  analytics.GenreStatsResponseDTO:
    properties:
      genre_name:
        type: string
      total_revenue:
        type: number
    type: object
  analytics.MovieStatsDTO:
    properties:
      movie_id:
        type: integer
      movie_title:
        type: string
      tickets_sold:
        type: integer
      total_revenue:
        type: number
    type: object
  auth.AuthTokenResponse:
